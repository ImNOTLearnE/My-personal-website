<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bento Grid × Slider — Glass Edition</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --glass-bg: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.18);
        --glass-shadow:
          0 20px 40px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
        --glass-blur: blur(18px);
        --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      body {
        font-family: "Cairo", sans-serif;
        background: #0a0a0f;
        color: #fff;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ===== SHARED NAV TABS ===== */
      .nav-tabs {
        display: flex;
        gap: 12px;
        justify-content: center;
        padding: 28px 20px 0;
        position: relative;
        z-index: 10;
      }
      .nav-tab {
        padding: 10px 24px;
        border-radius: 50px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
        font-family: "Cairo", sans-serif;
        font-size: 14px;
        font-weight: 600;
        transition: var(--transition);
        box-shadow: var(--glass-shadow);
        user-select: none;
      }
      .nav-tab:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.14);
      }
      .nav-tab.active {
        background: linear-gradient(
          135deg,
          rgba(120, 80, 255, 0.5),
          rgba(60, 180, 255, 0.4)
        );
        border-color: rgba(120, 80, 255, 0.6);
        color: #fff;
        box-shadow:
          0 8px 32px rgba(120, 80, 255, 0.3),
          var(--glass-shadow);
      }

      .section {
        display: none;
        animation: fadeIn 0.5s ease;
      }
      .section.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ============================================================
     PROJECT 1 — AURORA DASHBOARD
  ============================================================ */
      .p1-wrap {
        min-height: 100vh;
        background:
          radial-gradient(ellipse at 20% 20%, #1a0533 0%, transparent 60%),
          radial-gradient(ellipse at 80% 80%, #001840 0%, transparent 60%),
          radial-gradient(ellipse at 50% 50%, #0d0020 0%, #050510 100%);
        padding: 36px 32px 60px;
      }
      .p1-header {
        text-align: center;
        margin-bottom: 36px;
      }
      .p1-header h1 {
        font-size: clamp(28px, 4vw, 48px);
        font-weight: 900;
        letter-spacing: -1px;
        background: linear-gradient(135deg, #c084fc, #60a5fa, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .p1-header p {
        color: rgba(255, 255, 255, 0.45);
        margin-top: 8px;
        font-size: 15px;
      }

      .p1-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: auto;
        gap: 16px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        box-shadow: var(--glass-shadow);
        transition: var(--transition);
        overflow: hidden;
        position: relative;
      }
      .glass-card:hover {
        transform: translateY(-4px);
        box-shadow:
          0 32px 64px rgba(0, 0, 0, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
        border-color: rgba(255, 255, 255, 0.28);
      }

      /* Hero slider card */
      .c-hero {
        grid-column: span 2;
        grid-row: span 2;
        min-height: 380px;
      }
      .c-wide {
        grid-column: span 2;
        min-height: 160px;
      }
      .c-tall {
        grid-row: span 2;
        min-height: 220px;
      }
      .c-normal {
        min-height: 160px;
      }
      .c-full {
        grid-column: span 4;
        min-height: 140px;
      }

      /* Slider inside card */
      .slider-track {
        display: flex;
        width: 100%;
        height: 100%;
        transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .slide {
        min-width: 100%;
        height: 100%;
        padding: 28px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }
      .slide-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 50px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 10px;
        width: fit-content;
      }
      .slide h2 {
        font-size: clamp(18px, 2.5vw, 28px);
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 8px;
      }
      .slide p {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.6;
      }

      .slider-dots {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        z-index: 5;
      }
      .slider-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        transition: var(--transition);
        border: none;
      }
      .slider-dot.active {
        width: 20px;
        border-radius: 10px;
        background: #fff;
      }

      .slider-arrows {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 12px;
        pointer-events: none;
        z-index: 5;
      }
      .arrow-btn {
        pointer-events: all;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        font-size: 12px;
      }
      .arrow-btn:hover {
        background: rgba(255, 255, 255, 0.22);
        transform: scale(1.1);
      }

      /* Stat cards */
      .stat-card {
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .stat-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        margin-bottom: 12px;
      }
      .stat-val {
        font-size: clamp(24px, 3vw, 36px);
        font-weight: 900;
        line-height: 1;
      }
      .stat-label {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 6px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .stat-trend {
        font-size: 12px;
        font-weight: 700;
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .trend-up {
        color: #34d399;
      }
      .trend-down {
        color: #f87171;
      }

      /* Progress bar card */
      .progress-card {
        padding: 24px;
      }
      .progress-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 20px;
        color: rgba(255, 255, 255, 0.9);
      }
      .progress-item {
        margin-bottom: 16px;
      }
      .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 6px;
      }
      .progress-bar {
        height: 6px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 10px;
        transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      /* Mini chart */
      .chart-card {
        padding: 20px 24px;
      }
      .chart-title {
        font-size: 13px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 16px;
      }
      .mini-bars {
        display: flex;
        align-items: flex-end;
        gap: 6px;
        height: 60px;
      }
      .mini-bar {
        flex: 1;
        border-radius: 4px 4px 0 0;
        transition: var(--transition);
        cursor: pointer;
        position: relative;
      }
      .mini-bar:hover {
        filter: brightness(1.3);
        transform: scaleY(1.05);
        transform-origin: bottom;
      }

      /* Ticker / activity */
      .ticker-card {
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .ticker-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .ticker-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
      }
      .ticker-info {
        flex: 1;
      }
      .ticker-name {
        font-size: 13px;
        font-weight: 600;
      }
      .ticker-sub {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 2px;
      }
      .ticker-val {
        font-size: 13px;
        font-weight: 700;
      }

      /* Activity strip */
      .activity-strip {
        padding: 20px 28px;
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .activity-item {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .activity-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .activity-text {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
      }
      .activity-text strong {
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
      }

      /* ============================================================
     PROJECT 2 — COSMOS GALLERY
  ============================================================ */
      .p2-wrap {
        min-height: 100vh;
        background:
          radial-gradient(ellipse at 70% 10%, #0f2940 0%, transparent 50%),
          radial-gradient(ellipse at 10% 90%, #1a1040 0%, transparent 50%),
          #060810;
        padding: 36px 32px 60px;
      }
      .p2-header {
        text-align: center;
        margin-bottom: 36px;
      }
      .p2-header h1 {
        font-size: clamp(28px, 4vw, 48px);
        font-weight: 900;
        letter-spacing: -1px;
        background: linear-gradient(135deg, #f0abfc, #818cf8, #38bdf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .p2-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 14px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .g2-1 {
        grid-column: span 3;
        grid-row: span 2;
        height: 360px;
      }
      .g2-2 {
        grid-column: span 2;
        height: 170px;
      }
      .g2-3 {
        grid-column: span 1;
        height: 170px;
      }
      .g2-4 {
        grid-column: span 3;
        height: 170px;
      }
      .g2-5 {
        grid-column: span 1;
        height: 170px;
      }
      .g2-6 {
        grid-column: span 2;
        height: 170px;
      }
      .g2-7 {
        grid-column: span 2;
        height: 170px;
      }

      /* Gallery slide */
      .gallery-slide {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        border-radius: 20px;
      }
      .gallery-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .gallery-slide:hover .gallery-img {
        transform: scale(1.06);
      }
      .gallery-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.75) 0%,
          transparent 60%
        );
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        opacity: 0;
        transition: var(--transition);
      }
      .gallery-slide:hover .gallery-overlay {
        opacity: 1;
      }

      .swipe-gallery {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 20px;
        cursor: grab;
      }
      .swipe-track {
        display: flex;
        height: 100%;
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .swipe-slide {
        min-width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }
      .swipe-slide-bg {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        transition: transform 0.5s ease;
      }
      .swipe-gallery:hover .swipe-slide-bg {
        transform: scale(1.05);
      }

      .gallery-tag {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 4px 10px;
        border-radius: 50px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .gallery-info {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 16px 18px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
      }
      .gallery-info h3 {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 2px;
      }
      .gallery-info p {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
      }

      /* ============================================================
     PROJECT 3 — PRISM SHOWCASE
  ============================================================ */
      .p3-wrap {
        min-height: 100vh;
        background:
          radial-gradient(ellipse at 50% 0%, #1a0a00 0%, transparent 60%),
          radial-gradient(ellipse at 0% 100%, #001a10 0%, transparent 55%),
          #080608;
        padding: 36px 32px 60px;
      }
      .p3-header {
        text-align: center;
        margin-bottom: 36px;
      }
      .p3-header h1 {
        font-size: clamp(28px, 4vw, 48px);
        font-weight: 900;
        background: linear-gradient(135deg, #fbbf24, #f97316, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .p3-outer {
        max-width: 1200px;
        margin: 0 auto;
      }

      /* Horizontal scroll bento */
      .p3-scroll-area {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 0;
      }
      .p3-scroll-track {
        display: flex;
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .p3-panel {
        min-width: 100%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: 280px 180px;
        gap: 14px;
        padding: 20px;
      }

      .p3-card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        overflow: hidden;
        position: relative;
      }
      .p3-card:hover {
        transform: translateY(-5px) scale(1.01);
        border-color: rgba(255, 255, 255, 0.22);
        box-shadow:
          0 32px 60px rgba(0, 0, 0, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }
      .p3-featured {
        grid-column: span 2;
        grid-row: span 2;
      }

      .p3-product {
        padding: 20px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .p3-emoji {
        font-size: 38px;
        margin-bottom: 8px;
      }
      .p3-price {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 4px;
      }
      .p3-name {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.2;
      }
      .p3-desc {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 4px;
        line-height: 1.5;
      }
      .p3-btn {
        margin-top: 12px;
        padding: 7px 14px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: var(--transition);
        font-family: "Cairo", sans-serif;
        width: fit-content;
      }
      .p3-btn:hover {
        transform: scale(1.05);
        filter: brightness(1.15);
      }

      .featured-content {
        padding: 28px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .featured-badge {
        display: inline-block;
        padding: 5px 14px;
        border-radius: 50px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: rgba(251, 191, 36, 0.2);
        border: 1px solid rgba(251, 191, 36, 0.4);
        color: #fbbf24;
        margin-bottom: 12px;
        width: fit-content;
      }
      .featured-title {
        font-size: clamp(20px, 2.5vw, 30px);
        font-weight: 900;
        line-height: 1.1;
        margin-bottom: 10px;
      }
      .featured-price-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 14px;
      }
      .featured-price {
        font-size: 32px;
        font-weight: 900;
        color: #fbbf24;
      }
      .featured-old {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.3);
        text-decoration: line-through;
      }
      .featured-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .tag-chip {
        padding: 4px 10px;
        border-radius: 50px;
        font-size: 10px;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.6);
      }
      .featured-emoji-bg {
        position: absolute;
        right: 20px;
        bottom: 20px;
        font-size: 80px;
        opacity: 0.12;
        pointer-events: none;
        user-select: none;
      }

      .p3-nav {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        padding: 20px 0 0;
      }
      .p3-nav-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .p3-nav-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: scale(1.1);
      }
      .p3-step {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
        font-weight: 600;
        min-width: 60px;
        text-align: center;
      }

      /* Responsive */
      @media (max-width: 900px) {
        .p1-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .c-hero {
          grid-column: span 2;
        }
        .c-full {
          grid-column: span 2;
        }
        .p2-grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .g2-1 {
          grid-column: span 3;
        }
        .g2-2,
        .g2-4 {
          grid-column: span 3;
        }
        .g2-3,
        .g2-5,
        .g2-6,
        .g2-7 {
          grid-column: span 3;
        }
        .p3-panel {
          grid-template-columns: repeat(2, 1fr);
          grid-template-rows: auto;
        }
        .p3-featured {
          grid-column: span 2;
        }
      }
      @media (max-width: 600px) {
        .p1-grid,
        .p2-grid {
          grid-template-columns: 1fr;
        }
        .c-hero,
        .c-wide,
        .c-tall,
        .c-full,
        .g2-1,
        .g2-2,
        .g2-3,
        .g2-4,
        .g2-5,
        .g2-6,
        .g2-7 {
